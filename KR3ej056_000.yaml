body:
  text: 論痘疹受病之由夫小兒在胎之時乃母五臟之液所養成形也其母不知禁戒縱情厚味好啖辛酸或食毒物其氣傳於胞胎之中此毒發為瘡疹名曰三穢液毒一五臟六腑穢液之毒發為水泡瘡二皮膜筋肉穢液之毒發為膿水泡瘡三氣血骨髓穢液之毒發為膿血水泡瘡三毒既出發為疹痘瘡也子母俱忌食蔥韭薤蒜醋酒鹽醬獐兔雞犬魚腥等物世俗未曉將為發舉往往不顧其後誤傷者多矣論痘疹治法凡小兒瘡疹未出已出之間有類傷寒之狀增寒壯熱身體疼痛大便黃稠此正病也若無他疾不必服藥愚按痘疹若小兒首尾平和自有勿藥之喜蓋其腸胃軟弱易為虛實故必不得已折其太過益其不足可也凡療瘡疹先分表裡虛實如表裡俱實者其瘡易出易靨表裡俱虛者反是表實裡虛者其瘡易出難靨表虛里實者亦反是若始出一日至十日渾身壯熱大便黃稠乃表裡俱實其瘡必光澤起發滿肥且易靨也愚按治痘疹之法與癰疽無異若邪氣在裡而實熱者用前胡枳殼散元氣怯而虛熱者用參耆四聖散虛弱者用紫草木香湯虛寒者用參耆內托散虛寒內脫者用木香散若邪氣在表而實熱者用麻黃甘葛湯此要法也余見各症凡瘡疹已出未出之間或瀉渴或腹脹或氣促謂之裡虛急用十一味木香散治之愚按經云真氣奪則虛邪氣勝則實實謂邪氣實而真氣虛也然倒靨瀉渴等症若喜熱飲食手足並冷或不食嘔吐者是為陽氣虛寒也用辛熱之劑補之喜冷飲食手足不冷或唇舌黑裂者陽氣實熱也用苦寒之劑瀉之凡瘡疹已出未愈之間不光澤不起發不紅活謂之表虛急用十二味異功散治之愚按張翼之云吐瀉少食為裡虛陷伏倒靨灰白為表虛二者俱見為表裡俱虛用異功散救之甚至薑附靈砂亦可用若止裡虛減官桂止表虛減肉豆蔻若能食便閉而陷伏倒靨者為裡實輕用射干鼠黏子湯重用前胡枳殼散下痢吐瀉能食為裡實若用實里則結癰毒紅活綻凸為表實若用補表則潰爛不結痂凡痘一見斑點便忌葛根湯恐發得表虛也凡痘瘡已出未愈之間不光澤不起發不紅活或腹脹或瀉渴或氣促謂之表裡俱虛急用十二味異功散送七味肉豆蔻丸治之愚按前症審系表裡虛寒急用前法緩則不救一小兒出痘不起發紅活腹脹瀉渴皆以為不治施院使謂表裡虛寒用十二味異功散一劑即起發紅活諸症頓退又用參耆內托散貫膿而靨儒者薛戒甫子五歲出痘三四日下紫血日數滴至八日不止而瘡不起御醫錢春林謂脾氣虛寒用木香散二劑用丁香十一粒人參五錢一日服之次日痘皆起而有膿由是血漸止二十餘日而愈一小兒起發紅活但不時作癢口乾作渴便血面赤發熱先君謂腸胃有熱先用濟生犀角地黃湯加柴胡一劑諸症漸退形體倦怠此邪氣去而形氣虛弱耳用四君子湯加當歸黃耆紅花二劑而安一個兒痘瘡赤痛煩熱作渴或便血或衄血先君用犀角地黃湯而血愈又用紫草快癍湯加黃耆芍藥而愈後瘡痕色白用四君歸耆治之而痊一小兒出痘吐血其痘赤痛如錐或瘡出血余謂肝火熾盛用小柴胡湯加生地一劑隨用濟生犀角地黃湯一劑頓愈又用芹菜汁而痊一小兒痘瘡下血而不起發先君謂氣血不足用紫草快癍湯加參耆歸木治之血止瘡起但貫膿遲緩用八珍湯倍加參耆數劑瘡靨而根白癢此氣血虛而熱也用八珍湯二十餘劑而愈一小兒痘疹大便下血小便甚赤瘡顆甚赤發熱飲冷先君謂熱毒鬱滯先用八正散一劑後用解毒防風湯一劑頓愈又飲芹菜汁而全痊一小兒痘正發而便血倦怠少食作渴飲湯余謂倦怠便血此脾虛而不能攝血也少食作渴此脾虛而津液短少也用五味異功散加升麻紫草治之而愈一小兒便血腹脹困倦發熱口乾飲湯四肢逆冷先君以為脾氣虛寒不能攝血用五味異功散加丁香十粒炮姜五分二劑血止痘貫而靨一小兒七歲患痘瘡腹脹八九日矣先君云當急補脾土不信仍服消毒之藥忽大便下血甚多而歿一小兒作渴泄寫發熱飲冷唇舌皺裂瀉糞穢臭先君以為內熱所作用前胡枳殼散一劑稍愈又用清涼飲加漏蘆乳母服之兒頓安凡小兒斑駁疹毒之病俗言疹子是肺胃蘊熱因時氣黛發於外狀如蚊蚤所咬赤則十生一死黑則十死一生大抵遇春而生髮至夏而長成乃陽氣薰蒸故得生成者也臟腑調和血氣充實則易出易靨蓋因內無冷氣外常和暖也凡痘疹熱渴切不可與瓜柿蜜水等冷物及清涼飲消毒飲等藥恐損脾胃則腹脹喘悶寒戰咬牙而難治蓋咬牙者齒槁也乃血氣不榮不可妄作熱治愚按前症若兼吐瀉手足指冷者屬內虛寒而外假熱也急用木香散如不應用異功散若大便不通渴欲飲冷者則前所禁蜜水之類又當用矣但宜審其熱之虛實若屬虛熱者雖欲水拒之而不飲當用人參白朮散熱渴自止屬實熱者自甚索水且喜而飲之當以犀角磨水服諸症即解其後亦無餘毒之患矣北方出痘不拘冬夏若喜冷者再不用藥但與水飲無有不愈蓋北方地燥而又睡熱炕故也一婦人患時疫將愈更出痘瘡大起發體倦痛甚則昏憒煩渴飲湯不思食用十全大補湯及硃砂末其痛頓止食進體健仍用前湯倍加參耆十餘劑而貫膿又數劑而愈一妊婦發熱作渴遍身骨節作痛用仙方活命飲二劑諸症稍愈至十一日出痘百餘顆形氣甚倦用紫草木香散又出少許但口乾作渴用人參白朮散而渴止用八珍湯加柴胡丹皮而貫膿後去丹皮柴胡倍加參耆數劑而痘靨一男子年將三十出痘根窠赤痛發熱作渴服紫草飲之類前症益甚痘裂出血余用小柴胡加生地犀角二劑諸症頓減又用聖濟犀角地黃湯而貫膿再用八珍湯而結痂一小兒煩躁飲冷不止先君用濟生犀角地黃湯頓愈後渴而喜熱又用當歸補血湯而痊惟倦怠少食用七味白朮散而痊一小兒患此飲冷不止或痘脹痛先君用濟生犀角地黃湯並芹菜汁而頓愈凡痘瘡出不快多屬於虛若誤謂熱毒壅盛妄用宣利之劑致臟腑受冷榮衛澀滯不能運達肌膚則瘡不能起發充滿後不結實成痂癢塌煩躁喘渴而死愚按前症亦有各經熱盛壅遏而出不快者亦有毒甚痘疔而不能發起者亦有餘毒而潰癢者當細審其因而藥之一小兒九歲出痘六日癢塌寒戰院使錢密庵用十一味木香散二劑貫膿用參耆托裡散而靨後痕白作癢用十全大補湯而愈一小兒痘瘡膿未滿面赤作癢余謂氣血虛而有熱欲用溫補之劑不信乃服清熱之藥至十三日瘡痕色赤虛煩作渴腹痛不食手足逆冷而歿一小兒未周歲痘瘡焮痛出血哭不能已診其母有肝火先用小柴胡加山梔生地與母服子飲數滴頓愈又用加味逍遙散而痊一小兒出痘內有痘疔數枚雖挑破出黑血熱毒不解余痘不發皆以為不治先君以仙方活命飲徐灌一劑痘疔解而諸痘亦愈一小兒痘療患在臀間色黑大痛挑出黑血仍復堅痛皆以為不治先君用膈蒜灸數壯痛止色淡而軟挑出黑血甚多灌以活命飲患處及諸痘貫膿而愈凡小兒才覺傷風身熱是否瘡疹便服四味升麻葛根湯愚按痘疹未明而元氣實者最宜前湯若元氣虛者又當詳治恐發得表虛而痘難出也一儒者年三十餘因勞役倦怠發熱服補中益氣湯數劑發赤點以為癍另服升麻葛根湯一劑更加惡寒仍服益氣湯四劑至九日出痘甚多余用八珍湯加黃耆白芷紫草四劑至二十日膿始貫用十全太補湯月餘而靨凡痘疹始出一日至五七日之間雖身熱或腹脹足稍冷或身熱瀉渴或身熱驚悸腹脹或身熱出汗者服十一味木香散愚按前症屬脾氣虛寒假熱非此藥不救如未應佐以六君子專補脾氣更不應加木香補骨脂肉豆蔻兼補腎氣一小兒第五日不紅活至九日貫膿不滿余謂氣血虛弱用十全大補湯治之庶無後患不信至脫痂痕作癢色白至十四日而歿一小兒第七日膿清不滿形氣倦怠飲食少思大便不實用托裡散二劑手足指冷咬牙作渴用木香散倍用參耆一劑諸症頓退又用參耆四聖散四劑而愈凡瀉水穀或白色或淡黃煎十一味木香散送七味肉豆蔻丸治之瀉止者住服不止者多服愚按前症若察其外症若唇青指冷睡而露睛口鼻氣寒瀉色青白脾腎虛寒也用前藥六君子湯加補骨脂肉豆蔻若頰赤體熱睡不露睛口鼻氣熱瀉色黃赤脾土實熱也用瀉黃散一小兒腹脹渴瀉氣促體倦先君以為表裡俱虛用六君子湯加歸耆送四神丸一服諸症頓退瘡勢頓止但膿遲而渴仍用前湯加歸耆二劑瘡色紅活形體頗安任其貫膿而痊凡瀉頻津液內耗血氣不榮瘡雖起發亦不能靨也如身溫腹脹咬牙喘渴者難治緣穀食去多津液枯竭飲水蕩散真氣故多死矣速與十一味木香散救之如不應急用十二味異功散愚按前症兼手足指冷面色青白等症者屬陽氣虛寒急用木香散陽氣脫陷用異功散脾氣虛弱用六君子湯血氣虛弱用八珍湯不應用十全大補湯一小兒第九日不紅活不貫膿云歿於十二日陳院長謂屬虛寒用十一味木香散二劑漸紅活貫膿又用紫草木香湯及人參白朮散而愈族侄孫衍慶六歲出痘稀少瘡痂悉落至十三日身煩熱而畏寒手足逆冷厚衣圍火不能溫皆謂不治余思大熱而不熱者是無火也急用人參理中湯煎服一杯肢體頓溫更用人參白朮散調理而痊一男子年二十餘發熱煩躁痘黯出血足熱腰痛用聖濟犀角地黃湯二劑而貫膿用地黃丸料數劑而瘡靨一男子年將三十出痘色紫作渴飲水腰痛足熱耳聾余謂腎虛之症用加減八味丸料煎與恣飲熱渴頓止佐以補中益氣湯加五味麥門而愈一小兒十二歲出痘色黯兩足及腰熱痛便祕咽舌乾渴引飲不絶衆謂腎虛不治先君用加減八味丸料作大劑煎與恣飲至二斤諸症悉退又佐以補中益氣及八珍湯各十餘劑而痊凡四五日不大便用嫩豬脂二塊以白水煮熟切豆大與食之令臟腑滋潤使瘡痂易落切不可妄投宣瀉之藥元氣內虛則瘡毒入里多傷兒也愚按前症若因熱內蘊宜用射干鼠黏子湯解之或發熱作渴或口舌生瘡或咽喉作痛並宜用之凡瘡疹初出兩三日至十三日當忌外人及卒暴風寒穢惡之氣輕者三次出大小不一頭面稀少眼中無根窠紅肥滿光澤也重者一齊出如蠶種灰白色稠密瀉渴身溫腹脹頭溫足冷也輕變重者犯房室不忌口先曾瀉飲冷水餌涼藥也重變輕者避風寒常和暖大便稠也愚按丹溪先生云痘疹密則毒甚用人參敗毒散犀角地黃湯或以涼藥解之雖數貼亦不妨一小兒痘疹甚密至九日貫膿不滿色不紅活或云當歿於十二日余以為氣血虛弱用八珍湯內加糯米百粒數也至十五日膿完色正結痂而愈一小兒五歲出痘密而色白屬虛弱也始未悉用補托之藥而安旬余飲食過多忽作嘔吐面白兼青目唇牽動先君以為慢脾風症用五味異功散加升麻柴胡不信翌日手足時搐服前藥而不應急加木香乾薑二劑而愈一小兒第五日矣稠密色黑煩躁喜冷先君以為火極似水令恣飲冷芹汁煩熱頓止乃以地黃丸料服之至二十餘日而愈凡身熱發煩渴者宜用六味人參麥門冬散治之如不應用七味人參白朮散愚按前症若渴而飲冷者脾胃實熱宜用麥門冬散若渴而飲湯者氣虛熱渴宜用白朮散若大渴引飲面赤血虛發躁也用當歸補血湯凡痘瘡欲靨已靨之間而忽不能靨兼腹脹煩渴者急用十一味木香散愚按前症若兼惡寒或四肢冷瘡毒去而脾胃虛寒也宜用前藥若十指逆冷咬牙等症陽氣脫陷也用十二味異功散脾氣虛陷用六君加川芎當歸黃耆主之一小兒九歲出痘第七日發熱煩躁不貫膿色灰白寒戰咬牙瀉渴腹脹手足冷時仲夏飲沸湯而不熱腹中陰冷先用木香散二劑益甚用異功散一劑頓安又用六君子加附子三分二也後用調補之也至十四日而愈凡痘瘡欲靨已靨之間忽頭面溫足指冷或腹脹瀉渴氣促者急服十二味異功散若十一二日當靨不靨身不壯熱悶亂不寧臥則哽氣煩渴齧牙者急用十二味異功散加歸術以救陰陽表裡凡痘瘡已靨煩渴不止或頭溫足冷或腹脹或瀉或咬牙多致難愈急用十一味木香散以救之已上之症若誤與蜜水生冷之物則轉加熱渴而死愚按前症屬脾胃虧損內真寒而外假熱耳非溫補不救如前藥未應用十全大補湯加附子以純補之一小兒頭生一癤出膿將愈忽癤間腫脹發痘二十餘顆遍身赤點用快癍湯而漸出用紫草散倍加參耆而出完用托裡消毒而膿貫用托裡散而瘡靨一小兒痘已靨其痕色赤而錯縱日食粥七八碗作渴面赤先用白朮散二也渴減五六粥減大半又用四君加蕪荑黃連二劑痕平色退乃用八珍湯加蕪荑山梔而痊一小兒痘瘡愈後泄瀉飲食不化此脾腎氣虛用六君加補骨脂肉豆蔻治之而愈一小兒痘瘡將愈患泄瀉侵晨為甚飲食不化屬脾腎虛也朝用補中益氣湯夕用二神丸而愈凡身壯熱經日不除如無他症用六味柴胡麥門冬散治之熱退即止如不愈服七味人參白朮散愚按前症若肝膽熱毒用柴胡麥門冬散若肝經血虛用四物湯加黃耆柴胡若中氣虛熱用人參白朮散一男子患痘瘡作痛發熱不止其勢可畏皆以為不起施銀臺用消毒救苦湯治之諸症頓退豫先用仙方活命飲痛全止又用八珍湯加紫草三錢四劑貫膿而靨一小兒患痘稠密大痛發熱勢甚危急先君用消毒救苦湯一劑安臥良久遍身出小痘頓消再也俱貫膿而靨凡身壯熱大便堅實或口舌生瘡咽喉腫痛皆瘡毒未盡用四味射干鼠黏子湯如不應用七味人參白朮散愚按前症若壯熱飲冷屬熱毒在表宜用前湯若兼大便不通屬熱毒在內少用四順清涼飲若熱毒既去胃氣虛而發熱用七味人參白朮散若因陰血虧損而發熱用四物湯一小兒六歲患痘第七日根顆赤痛大便祕結小便赤澀煩躁飲冷或用清涼解毒之劑未應錢密庵以為熱毒內蘊用四順清涼飲一劑並豬膽汁導下結糞而安又用犀角地黃湯其痘自靨一小兒痘瘡發熱作渴焮赤脹痛大便祕結先用四順清涼飲一劑諸症頓退又用四味鼠黏子湯一也諸症全退再用紫草湯而貫膿用消毒飲而痘靨一小兒痘愈而聲喑面赤足心發熱小便赤少先君以為腎經虛熱用六味地黃丸補中益氣湯而愈其時患是症用清熱解毒者俱不起一小兒十一歲患痘第四日根盤紅活起發因痛甚不止至七日形氣甚倦痘色淡而欲陷此因痛甚而傷元氣也先用仙方活命飲一劑而痛止再用八珍湯而貫靨凡風熱咳咽膈不利用三味桔梗甘草防風湯治之如不應用七味人參白朮散主之愚按前症如痘熱內作宜用桔梗甘草防風湯如兼痰熱咳嗽佐以抱龍丸若氣虛痰涎壅上宜用人參白朮散以補脾肺一小兒痘瘡十二日患咳嗽十餘日不愈所服皆發表化痰余曰此脾肺氣虛復傷真氣而變肺癰也不信仍服前藥果吐膿血用桔梗湯而愈一小兒痘將愈咳嗽面色黃白嗽甚則赤用五味異功散調補而愈凡涕唾稠黏身熱鼻乾大便如常小便黃赤用十六味人參清膈散如不應用七味人參白朮散愚按前症屬脾肺蘊熱痘邪為患用清膈散解散邪氣若脾肺虛熱不能司攝用人參白朮散調補中氣一小兒痘赤壯熱嗽咳痰甚煩熱作渴用人參清膈散一也諸症頓退日用芹菜汁旬余而靨一小兒痘瘡狂喘躁熱作渴飲冷痰涎不利先君用十六味清膈散犀角地黃湯各一劑頓愈又用當歸補血湯而愈一小兒痘赤狂喘大便不利先君治以犀角地黃湯芹菜汁而痊一小兒痘愈後涕唾口乾飲湯鼻塞或腹作脹先用白朮散二劑後用六君子湯而愈凡痰實壯熱胸中煩悶大便堅實臥則喘急速用前胡五味枳殼湯治之愚按前症若因腸胃蘊熱宜急用前湯緩則熱毒延內多致有誤一小兒患痘赤痛痰喘作渴大便不利錢密庵用前胡枳殼散一劑諸症頓退又用濟生犀角地黃湯二劑月餘而愈一個兒第八日根顆赤腫脹痛作渴大便下黑血煩渴痰喘飲冷呻吟求治施銀臺以為血熱毒蓄於內用聖濟犀角地黃湯一劑諸症悉退又用消毒丸及化班湯而愈一小兒痘根色赤作痛發熱口渴喜冷大便堅實用清涼飲一劑痛熱少減再劑便利渴止卻用聖濟犀角地黃湯而安用芹菜汁而靨一小兒痘根色赤作痛熱渴喜飲冷水大便不利先用五味前胡枳殼散大便利而熱渴減又用聖濟犀角地黃湯而安用芹菜汁而靨一小兒大便不利小便赤澀作渴飲冷先君用涼膈散一劑漸愈又用濟生犀角地黃湯及芹菜汁而痊若乳母有肝火兒患此症必用加味逍遙加黃芩犀角兼治其母一小兒痘已愈而痕赤作痛內熱作渴二便不利先君用濟生犀角地黃湯及芹菜汁而痊後用四物黃耆而安一小兒痘痕白或時癢作渴飲湯大便稀溏先君用五味異功散加當歸黃耆而瘥一小兒痘痕白時或癢先君以為氣血俱虛用八珍湯補之不信自用解毒之劑後卒變慢脾風而歿惜哉凡飲冰雪不知寒劑陽盛陰虛也飲沸湯不知熱劑陰盛陽虛也陽盛則補陰木香散加丁香官桂陰盛則補陽異功散加木香當歸每一兩藥共加一錢愚按陽盛者當用清涼飲以補陰陰盛者當用異功散以補陽須審的實而用若或少差死在反掌前云乃傳寫之誤凡痘瘡首尾若誤飲冷水瘡靨之後其痂遲落或生癰腫或成疳蝕蓋脾胃屬土而主肌肉水濕所傷則津液衰少榮衛澀滯不能周流故瘡痂遲落而生癰腫愚按痘癰之類屬血熱未解而內作外邪搏於肌膚之間或餘毒蘊結經絡輕則肌表津淫瘙癢重則肢節壅腫作痛或餘毒熾盛先用仙方活命飲以解其毒卻用托裡消毒散毒氣將盡用四君歸耆以補托元氣大凡痘瘡始末皆系脾胃之氣所主若飲食藥餌失宜多致變症故凡飲食少思內熱晡熱者屬脾胃氣虛血弱佐以四君芎歸黃耆升麻若飲食如常發熱作痛者屬氣血虛弱餘毒為患佐以射干鼠黏子湯若飲食如常發熱作痛大便祕結者屬熱毒內蘊用大連翹飲如不應仙方活命飲若根赤而作癢血虛也四物加牡丹皮色白而作癢血虛也四君加當歸芍藥色赤而作痛血熱也四物加連翹金銀花腫而不潰血氣虛也用托裡消毒散潰而不愈脾氣虛也用六君子湯一小兒痘毒蝕陷數以雄黃散及服加味解毒散而愈一小兒痘毒遍身腐潰膿水淋漓以經霜茅草研末鋪於寢席更服九味解毒散頓愈用神效當歸膏數之而痊一小兒痘毒後腿膝腫痛此脾腎虛而毒流注先用活命飲四劑腫痛頓減再用補中益氣湯及六味地黃丸而痊一小兒腿膝腫潰而膿水不止內熱晡熱體倦肌瘦先君以為元氣復傷用補陰八珍湯六味丸三月餘而愈一小兒痘已愈兩目昏閉先君用鼠黏子湯加山梔龍膽草犀角目開而有赤白翳佐以蛇蛻散外用二粉散尋愈凡瘡疹已靨未愈之間五臟未實肌肉尚虛血氣未復被風邪相搏則津液氣滯遂成疳蝕宜用雄黃散綿繭散等藥治之久而不愈則潰多致不起愚按前症屬足陽明胃經其方解毒殺蟲之劑若毒發於外元氣未傷者用之多效若胃氣傷損邪火上炎者用蕪荑湯六味丸若赤痛者用小柴胡湯加生地黃肝脾疳症必用四味肥兒丸及人參白朮散更佐以九味蘆薈丸一女子痘痂將脫回其穢氣以湯浴已而身熱如灸四肢強直如發痙然此腠理開泄熱毒乘虛而入用十全大補湯一劑頓安一小兒痘出甚密先四肢患毒膿潰而愈後口患疳涎蝕牙齦先用大蕪荑湯活命飲各一劑又用清胃散加犀角及蟾蜍丸而愈後發熱作渴口中作痛服蟾蜍丸搽人中黃而安類集痘疹已效名方葛根麥門冬散治小兒熱毒癍疹頭痛壯熱心神煩悶葛根三錢麥門冬去心四錢人參二錢石膏半兩川升麻甘草茯苓各二錢赤芍藥一錢上為粗散每服三錢水一大盞煎至六分去滓徐徐溫服不拘時量大小增減愚按前方足陽明胃經之藥也外除表邪內清胃火兼補元氣若非發熱作渴表裡有熱者不可用若表裡俱虛而發熱作渴者宜用人參麥門冬散生地黃散治小兒癍疹身熱口乾咳嗽心煩者生地黃半兩麥門冬去心七錢杏仁款冬花陳皮各三錢甘草炙二錢半上為粗散每服三錢水一大盞煎至六分去滓徐徐溫服不拘時量大小加減愚按前方若肺經有熱者宜用此方若痰氣上壅佐以抱龍丸惺惺散七味治小兒風熱瘡疹時氣頭痛壯熱目澀多睡咳嗽喘促桔梗炒真細辛人參甘草白茯苓真川芎白朮各一兩上為粗散每服三錢水一大盞薄荷五葉生薑三片同煎至六分去滓徐徐溫服不拘時候量大小加減愚按前症方若表虛風熱所乘而致諸症者宜用此藥若表實內熱相搏而致諸症者宜用升麻葛根湯若兼作渴飲冷者須用葛根麥門冬散大凡瘡疹未出已出之間多增寒壯熱身體疼痛大便黃稠此正病也若無他疾不必服藥四味升麻葛根湯治初發熱痘疹未明宜用此湯以散之白芍藥炒川升麻一兩甘草葛根一兩半上為粗散每服三錢水一大盞煎至六分去滓不拘時徐徐溫服愚按前方胃經發表之也表實而熱毒壅滯於肌肉者須用此藥以疏泄之恐虛其表而痘毒不能托出也十一味異功散木香大腹皮人參桂心北茯苓青皮前胡訶黎勒去核半夏薑製丁香甘草炙各三錢上為粗散每服三錢水一大盞生薑三片同煎至六分去滓空心溫服量大小以意加減愚按前方治痘瘡已出未愈之間其瘡不光澤不起發不紅活或已出一日至五七日間或泄瀉作渴或肚腹作脹氣促作喘或身雖熱而腹脹足指冷或身熱而作渴或身熱而驚悸腹脹或身熱汗出不止或氣急寒戰咬牙或渴而飲水愈渴或瘡欲靨而不靨或瘡痂欲落不落而反腹脹渴瀉足指寒冷或驚悸寒戰咬牙此脾胃終變虛寒津液衰少此發內經微旨陰陽蘊奧非神於朮者豈能言哉前症乃陽氣內虛寒而外假熱如癰疽脾胃虧損諸臟虛寒之敗症急用前散以救胃氣亦有可生者十二味異功散木香三錢半官桂二錢去粗皮當歸三錢半人參二錢半茯苓二錢陳皮厚朴薑製二錢半白朮二錢半夏薑製一錢丁香肉豆蔻附子炮去皮一錢半上為粗散每服三錢水一大盞半生薑五片肥棗三枚煎至六分去滓空心溫服三歲兒作三服五歲兒作兩服一周兩歲兒作三五服病有大小以意加減此藥家傳五世纍經效驗愚按前方治痘瘡已出未出不起發不光澤不紅活謂之表虛宜用此藥治之若已出未愈瘡不光澤或不起發不紅活或腹脹作渴泄瀉氣促謂之表裡虛寒急用此藥送豆蔻丸或十一日間不靨壯熱悶亂不寧臥則煩渴咬牙手足指冷數飲沸湯而不熱圍火重衾而仍寒悉屬表裡虛寒也王太僕云大寒而盛熱之不熱是無火也當益其心火急用前藥以回其陽亦有生者肉豆蔻丸七味治瀉水穀或白或淡黃不能止者木香宿砂三錢白龍骨半兩訶子肉半兩赤石脂七錢枯白礬七錢半肉豆蔻半兩上為細末用麵糊為丸如黍米大一周歲兒每服三五十丸三歲兒服百丸溫米飲下瀉甚者煎木香散或異功散送下瀉止住服不止多服愚按前方治陽氣虛寒腸滑泄瀉之澀劑蓋腎主大便若因腎氣不固而致前症者宜用木香散送四神丸如不應急煎六君子湯送四神丸補之蓋豆蔻丸澀滯之功多補益之功少也人參麥門冬散治痘瘡微渴一名麥門冬散麥門冬一兩人參甘草炙陳皮白朮厚朴薑製各半兩上為粗散每服三錢水一大盞煎至六分去滓徐徐溫服不拘時量大小增減愚按前方若痘瘡熱毒氣虛作渴宜用之若因氣虛弱作渴用人參白朮散消毒散治痘瘡六七日間身壯熱不大便其脈緊盛者用此藥以微利之一名消毒飲牛蒡子四兩杵炒荊芥穗甘草炙各一兩上為粗散每服三錢水一大盞煎至八分去滓不拘時徐徐溫服愚按前方若毒在肌肉尚未能盡發而致斯症脈浮而緊實最宜此藥疏解其毒若痘頓輕脈沉而緊者毒在臟腑宜用前胡枳殼疏通以絶其源其痘尤輕柴胡麥門冬散治痘瘡壯熱經日不止更無他症此藥治之即六味柴胡麥門冬散柴胡二錢半龍膽草炒一錢麥門冬三錢甘草炙人參黑參各一錢半上為粗散每服三錢水一大盞煎至六分去滓不拘時徐徐溫服量大小加減愚按前方若痘瘡表熱根盤色赤焮痛作渴飲冷或兩目作痛或素有肝火而患痘瘡者尤宜用之射干鼠黏子湯治痘瘡壯熱大便堅實或口舌生瘡咽喉腫痛皆餘毒所致鼠黏子四兩炒杵甘草炙升麻射干各一兩上為粗散每服三錢水一大盞煎至六分去滓徐徐溫服愚按前方凡痘瘡初出發熱焮痛根盤赤盛或咽喉口舌疼痛作渴引飲者宜用若因胃氣虛弱發熱而致前症者宜用人參麥門冬散桔梗甘草防風湯治風熱咽喉不利桔梗炒甘草炙防風各等分上為粗散每服三錢水一大盞煎至六分去滓徐徐溫服不拘時量大小加減愚按前方若上焦風熱或痰涎上攻咽喉不利或口舌生瘡作渴引飲者須用此藥發散解毒痘雖出亦在輕淺人參清膈散治涕唾稠黏身熱鼻乾大便如常小便黃赤宜用此方治之人參柴胡當歸芍藥炒知母炒桑白皮炒白朮炒黃耆炒紫菀地骨皮茯苓甘草桔梗炒各一兩黃芩半兩石膏滑石各一兩半上為粗末每服三錢水一大盞生薑三片同煎至六分去滓不拘時徐徐溫服量大小加減愚按前症即癰疽因熱毒蘊結於臟腑經絡之間者當用此藥以疏導托裡調和榮衛使邪氣退則元氣不傷而痘瘡易愈也前胡枳殼散治痰實壯熱胸中煩悶大便堅實臥則喘急前胡一兩枳殼赤茯苓大黃甘草炙各半兩上為粗散每服三錢水一大盞煎至六分去滓不拘時量大小加減如身溫脈微並瀉劑不可服愚按前症若屬肺胃實熱氣鬱痰滯大便祕結小便赤澀煩渴飲冷身熱脈數者宜用之以表散外邪疏通內臟使邪氣不壅滯且痘瘡輕而易愈也人參白朮散治痘瘡已靨身熱不退此藥清神生津除煩止渴人參白朮藿香葉木香甘草白茯苓六味各一兩乾葛三兩上為粗散每服三錢水一大盞煎至六分去滓不拘時徐徐服愚按前症若痘瘡已靨身熱或津液少而口乾引飲者胃氣虛弱也宜用人參白朮散若腹脹泄瀉口乾足指寒冷者脾氣虛寒也宜用十一味木香散若形寒惡寒嘔吐不食腹脹瀉渴等症乃脾氣虛寒下陷也用六君子加升麻薑桂如不應急加丁香若發熱煩躁身熱惡衣屬血脫髮躁用當歸補血湯大凡痘瘡若脾氣虛弱出不快者誤以為熱毒壅盛用涼藥宣利解散致脾胃受傷元氣愈虛使瘡不起發不克滿不結靨不成痂而癢塌煩躁喘渴死者多矣凡痘瘡首尾不宜與水則瘡靨之後其痂落遲或主癰腫治失其法必成疳蝕瘡血水不絶甚則面黃唇白多致難愈蓋脾胃屬土而主肌肉故也韶粉散治小兒痘瘡才愈而毒氣尚未全散瘡痂雖落其瘢雖猶黯或凹凸肉起當用此藥塗之韶粉一兩輕粉一錢上研和入煉豬脂油拌勻如膏薄塗瘡瘢上如痘痂欲落不落當用此方羊𩩅骨髓一兩上煉入輕粉一錢研成白膏瓷合盛之塗瘡上如痘瘡癢誤搔成瘡及瘡痂欲落不落用上等白蜜塗之其痂自落亦無紫黑瘢痕神妙愚按前症若痘瘡痕赤而作癢屬血虛而有熱也佐以四物牡丹皮若痕白而作癢氣虛而有熱也佐以四君芎歸瘡痂欲落不落者脾經血氣虛八珍湯若發熱而大便祕結者腸胃內熱也犀角消毒丸發熱而大便調和者肺胃熱也麥門冬散膿水淋漓者肌表熱也用敗草散敷之雄黃散治小兒因痘瘡牙齦生疳蝕瘡雄黃一錢銅緑二錢上二味同研極細量瘡大小干糝綿繭散治小兒因痘瘡餘毒肢體節骱上有疳蝕瘡膿水不絶出蛾綿繭不拘多少上用生白礬捶碎實繭肉以炭火燒礬汁干取出為末干貼疳瘡口內如腫臖作痛更服活命飲愚按雄黃散清肝殺蟲解毒外治之方也其症所感之經與所致之因各有不同若因手足陽明經蘊熱所致者用犀角消毒散若因脾經肝熱者用大蕪荑湯若因腎經虛熱者用地黃丸若因肝經疳熱者用蕪荑湯送大蘆薈丸其綿繭散總治瘡毒膿水淋漓收斂之外劑若果系內無餘毒而未痊者宜用斂之若因氣血虛而不斂宜用托裡散若發熱腫痛大便不結用仙方活命飲更以隔蒜灸法若腫痛作渴大便祕結用四順清涼飲若大便已通腫痛未退仍用活命飲若發熱倦怠大便調和用八珍湯加犀角如疳蝕未應急用隔蒜灸若發熱口乾肢體倦怠用八珍湯加黃耆若飲食少思肢體倦怠用五味異功散加當歸若膿水不絶而發熱用四物參耆丹皮若膿水不絶而惡寒用四君歸耆惡寒發熱者用八珍黃耆若乳母肝經血虛發熱用加味逍遙散若肝經因怒發熱用加味小柴胡湯若肝經因郁發熱用加味歸脾湯仍參前痘瘡首尾誤飲水證穀精草散治小兒痘瘡已靨眼目翳膜遮障瞳人癮澀淚出久而不退或十二三日瘡痂已落其瘡瘢猶黯或凹或凸此肌肉尚嫩不可澡浴及食炙爆辛辣有毒之物恐熱毒薰蒸肝膈目生翳障若不能守禁而致患者須用此治之穀精草一兩生蛤粉二兩上為細末以獖豬肝一葉用竹刀批片糝藥在內用草繩縛定入瓷器內量用水慢火煮熟令兒食之愚按前症若痘瘡愈後餘毒入於肝經而作痛者宜用此方羊肝散亦效若肝經熱毒眼睛作痛佐以小柴胡湯加生地黃或犀角地黃湯解毒湯治一切熱毒腫痛或風熱搔癢脾胃黃連三分金銀花連翹各五分上水煎服愚按前症當審其臟腑部分及各隨所因而治之若在乳下必當兼治其母參湯散治水痘地骨皮半分炒麻黃一分去節人參一分滑石半分大黃一分濕紙煨熟知母羌活各一分甜葶藶一分用濕紙炒甘草炙半分上為末每服五分水一小盞入小麥七粒同煎至十數沸每服三五匙不可多服愚按前方發表散邪疏通內熱之峻劑若遍身作痛壯熱煩躁作渴飲冷大便祕結小便澀滯喘嗽等症宜用此方或前胡枳殼散然水痘多屬表邪若但發熱引飲小便赤色者當用升麻葛根湯如無他症不必用藥也上小兒瘡疹無正方論雖有王談錢氏之書止見其方未見其源療之者往往以藥宣利解散因耗傷真氣遂至不救者多矣深可痛憫文中今將祖父祕傳方論集為一卷蓋守此方三十餘年全活者甚衆百不失一今合廣其傳使患劑無枉夭之禍醫劑有活人之功此僕之夙心也附方三豆飲治天行痘瘡始覺即服之多者必少少者不出等症小赤豆黑豆緑豆甘草節五錢上水煮熟任兒食之七日自不發紫草木通湯治痘疹出不快紫草人參木通茯苓糯米各等分甘草減半上每二錢水煎服升均湯治痘瘡已出不勻或吐瀉發熱作渴升麻乾葛芍藥炒人參白朮炒茯苓甘草紫草如無紅花代之上每服三五錢姜水煎參耆內托散治痘瘡裡虛發癢或不潰膿或為倒靨等症人參黃耆炒當歸川芎厚朴薑製防風桔梗炒白芷官桂紫草木香甘草上八味糯米一撮水煎服仍量兒加減紫草快癍湯治痘疹血氣不足不能發出色不紅活等症即紫草湯紫草人參白朮茯苓當歸川芎木通芍藥甘草糯米上每服二錢水煎人參胃愛散治痘瘡已發未發吐瀉不止不思飲食等症人參藿香紫蘇木瓜丁香茯苓甘草糯米上每服三錢薑棗水煎紫草木香湯治痘瘡裡虛癢塌黑陷悶亂紫草木香茯苓白朮人參甘草炒糯米上每服三錢水煎大如聖飲子治瘡疹癍痘毒攻咽嗌腫痛熱渴或成腫毒不消等症桔梗甘草鼠黏子炒各一兩麥門冬五錢上每服二錢水煎四聖散治痘疹出不快及倒靨紫草茸木通甘草炙枳殼麩炒黃耆各等分上每服二錢水煎獨聖散治痘瘡倒靨陷伏用穿山甲取前足嘴上者燒存性為末以木香湯入少酒服之快透散治痘瘡出不快等症紫草蟬蛻木通芍藥甘草炙各等分上每服二錢水煎愚按海藏先生云身後出不快足太陽經也用荊芥甘草防風湯身前出不快手陽明經也用升麻葛根湯四肢出不快足陽明經也用防風芍藥甘草湯此皆解毒升發之劑也不可不知鼠黏子湯治癍疹稠密身熱等症鼠黏子炒當歸甘草炙各一錢柴胡連翹黃芩黃耆各一錢半地骨皮二錢上每服二錢水煎紫草散治痘疹黑陷氣血虛弱瘡疹不起紫草甘草黃耆炙糯米各一錢半上水煎服益元散治痘疹初起煩躁作渴等症滑石六兩甘草一兩上各另為末每服五六分白湯調下活血散治痘疹血虛熱已出未盡煩躁不寧肚腹疼白芍藥一兩酒炒上為末每服一匙糯米湯調下荔枝湯亦可對四君子湯加歸耆名參歸活血散參耆四聖散治痘瘡有熱出至六七日不能長不生膿或作癢人參黃耆炒白朮炒茯苓當歸芍藥炒川芎各五分紫草如無紅花代之木通防風各三分糯米二百粒上水一盞煎半盞徐徐服人參透肌散治痘瘡虛而有熱雖能出快長不齊整隱於肌膚間者人參紫草如無紅花代之白朮茯苓當歸芍藥木通蟬退甘草糯米各等分上每服三錢水一盞煎半徐徐服大連翹飲治積熱大小便不利及痘後餘毒不解肢體患瘡或丹瘤遊走不止連翹瞿麥荊芥木通赤芍藥當歸防風柴胡滑石蟬退甘草各一錢山梔炒黃芩炒各五分上每服三錢水煎一歲每服一二匙三五歲者每服數匙愚按前方苦寒辛散發散肌表疏通內臟之劑若表裡實熱煩躁飲冷大便不通小便祕結者最宜用之慎不可過劑恐後傷胃氣而變他症也若妄發之則成斑爛妄下之則成虛脫胡荽酒治穢氣使痘疹出快上用胡荽一把以好酒二盞煎一兩沸令乳母每含一兩口噴兒遍身勻噴頭面房中須燒胡荽香能闢除穢氣使痘疹出快煎過胡荽懸掛房門上最妙愚按前方最宜用之若痘疹已出而飲食少思宜用棗灸之兒聞棗香猶能開胃氣進飲食解毒氣若因飲食停滯未及消導遂用此法恐反助其邪以生濕熱則成痘毒也甘露飲子治積熱及痘後咽喉腫痛口舌生瘡齒斷宣腫生地黃炒麥門冬去心焙熟地黃天門冬去心黃芩炒石斛枳殼麩炒枇杷葉去毛茵陳甘草炙各等分上每三錢水煎每服三五匙不可多服愚按前方涼血解毒除濕清熱寒中之劑治者審之托裡散治痘毒元氣虛弱或行克伐不能潰散用之未成自消已成自潰人參黃耆炒各二錢當歸酒洗白朮陳皮熟地黃茯苓芍藥炒各一錢五分甘草炙五分上三五錢水煎服托裡消毒散治痘毒氣血虛弱不能起發腐潰收斂或發寒熱肌肉不生人參黃耆炒當歸酒洗川芎芍藥炒白朮炒陳皮茯苓各一錢金銀花連翹白芷各七分甘草五分上每服三五錢水煎服八正散治下焦積熱大小便不通或小便淋漓脈症俱實者大黃酒炒車前子炒瞿麥萹蓄山梔炒木通各一錢滑石煅二錢甘草一錢上每二錢水煎服涼膈散治上焦實熱煩渴面目赤熱頭昏咽燥咽痛口瘡便溺赤澀狂言譫妄睡臥不安大黃朴硝甘草各二兩連翹一兩梔子仁薄荷葉各二錢上為末每服一錢竹葉蜜些少煎服解毒防風湯治痘瘡毒氣熾盛防風地骨皮黃耆白芍藥炒荊芥牛蒡子上每服四錢水煎服或為末白湯調下人參理中湯治中氣虛熱人參白朮炒甘草炙各等分上每服一錢薑棗水煎服為末薑汁糊丸緑豆大每服二三十丸白湯下亦可六君子湯治脾胃虛弱不思乳食或嘔吐泄瀉飲食不化或時患飲食停滯人參白朮茯苓各二錢陳皮半夏甘草炙各一錢上每服二三錢薑棗水煎補中益氣湯治中氣不足因睡發熱或元氣虛弱感冒風寒諸症黃耆炙人參白朮炒甘草炙當歸陳皮各五分升麻柴胡各二分上薑棗水煎瀉黃散治脾胃實熱藿香葉甘草各七錢五分山梔仁一兩石膏五錢防風二兩上用蜜酒微炒為末每一二錢水煎五味異功散治脾胃虛弱吐瀉不食人參茯苓白朮甘草炒陳皮各等分上為末每服三錢薑棗水煎四君子湯治脾虛飲食不化或泄瀉嘔吐人參白茯苓白朮甘草炙各五分上水煎服四物湯治肝脾血虛發熱日晡益甚或煩躁不寐當歸熟地黃各二錢白芍藥炒一錢川芎五分上作二劑水煎服桔梗湯治咳嗽吐膿痰中有血已成肺癰桔梗炒貝母當歸酒浸瓜蔞仁枳殼麩炒薏苡仁桑白皮炒百合蒸各一錢五分五味子炒甜葶藶炒地骨皮知母炒甘草節防風黃耆炒杏仁各五分上每服一二錢水煎四順清涼飲治積熱頰赤作渴四肢驚掣大便祕澀赤芍藥當歸大黃甘草各等分上每服一錢水煎蟾蜍丸治無辜疳症一服虛熱退二服煩渴止三服瀉痢愈蟾蜍一枚夏月滿渠中取腹大不跳不鳴身多㿔者上取糞蛆一杓置桶中以尿浸之卻將蟾蜍跌死投與蛆食一晝夜用布袋盛蛆置急流中一宿取出瓦上焙乾為末入麝香一字粳米飯丸麻子大每服二三十丸米飲下甚效人參敗毒散治傷風時氣寒熱咳嗽人參茯苓甘草炒前胡川芎羌活獨活桔梗柴胡枳殼各等分上為末每服一二錢生薑薄荷水煎仙方活命飲治一切瘡毒未成內消已成即潰此消毒排膿止痛之聖藥也若膿出而腫痛不止元氣虛也當用托裡散之類穿山甲白芷防風沒藥甘草赤芍藥當歸尾乳香天花粉貝母各一錢金銀花陳皮各三錢皂角刺二錢上每服二三錢酒水各半煎神效隔蒜灸法治痘疔毒氣熾盛使諸痘不能貫發已起發者不能貫膿已貫膿者不能收靨或大痛或麻木痛者灸至不痛不痛劑灸至痛其毒隨火而散京師嘗見治此者即已線針挑破出毒血諸毒隨時貫膿若挑破不痛不出血者難治若用此法灸之即知痛更用針挑破紫血隨出諸痘隨貫亦有生者其法用大蒜頭切三分厚安痘疔上用小艾炷於蒜上灸之每五壯易蒜再灸若紫血出後腫痛不止尤宜當灸治者審之神效當歸膏治痘毒津淫或湯火等瘡不問已潰未潰當歸黃蠟生地黃各一兩麻油上先將當歸地黃入油煎黑去渣入蠟熔化候冷攪勻即成膏矣蛇蛻散治痘毒目翳蛇蛻二錢為末瓜蔞仁五錢研爛上用羊肝一片批開入藥末二錢線扎緊用米泔煮熟頻與兒食或乳母食荊齊甘草防風湯解痘毒荊芥甘草防風各等分上每服一錢水煎防風芍藥甘草湯解痘毒防風芍藥甘草各等分上每服一錢水煎麻黃甘草湯治表實痘毒熾盛麻黃五分生甘草三分上水煎服輕粉散治出痘眼內生臀真輕粉黃丹各等分上研左眼有翳吹入右耳右眼有翳吹入左耳更以緑豆皮穀精草白菊花各一兩為末每服三錢乾柿一枚米泔一盞煎乾將柿去核食之不拘時候日三枚成都方士禹太和云治痘瘡黑陷垂死者用壁間喜蜘如黃豆者一枚擂爛若一歲兒用雄黃一釐二歲者用二釐十歲者一錢再同蜘蛛研勻用好燒酒一杯調和徐徐服之余意此方即同前十二味與十一味異功散之相類也若因陽氣虛寒不能營運周身以致四肢逆冷腹脹唇青其色黑陷劑宜用燒酒若因元氣虛乏或色淡白隱隱見於肌膚而不能起發者宜用陳酒亦可不可拘滯於燒酒也若小兒未周歲者宜酌量與服之亦不可拘於杯許也又有一等氣血俱虛者或色淡紅而不光澤又不起發或驚悸咬牙用紫草與紅花以煮陳酒濃煎與兒服之亦可以保其全生也用者宜審諸抱龍丸治痰熱喘嗽發熱驚悸不安亦能發痘瘡膽星四兩天竺黃一兩雄黃硃砂各五錢麝香少許上為細末用甘草一斤煮汁為丸每一兩作二十丸用薄荷或燈心湯化下造膽星法南星不拘多少臘月蠟水浸洗切塊曬乾為末用黃牛膽汁拌勻仍用牛膽殼裝入填滿以線扎口懸掛當風處陰乾隔年方可用愚按前方清熱豁痰利氣之藥過劑則脾肺復傷而反不愈或更加胸腹作脹飲食作嘔者宜用人參白朮散培補中氣五福化毒丹治胎毒及痘後頭面生瘡眼目腫痛生地黃熟地黃天門冬去心麥門冬去心玄參各三兩甘草甜硝各三兩青黛一兩五錢上為末煉蜜丸芡實大每服一丸白湯化下愚按前方生血涼血解毒寒中之劑用之得宜殊有良驗不過一二丸犀角消毒丸治諸積熱及痘疹後餘毒生瘡生地黃防風當歸犀角屑鎊荊芥各一兩牛蒡子杵炒赤芍藥連翹桔梗各七錢薄荷黃芩炒甘草各五錢上為末煉蜜丸芡實大每服一丸薄荷湯下愚按前方清熱解表涼血破血消毒損胃之劑多不過一二服大凡痘毒當參前痘瘡誤飲冷水韶粉散治法用之余仿此敗草散治痘瘡撾搔或瘡膿血淋漓謂之斑爛用屋爛草或蓋牆爛草多年者佳如無曠野生者尤佳為末搽之愚按前症亦有氣血虛熱而不愈者如遍身患者須多摻鋪席上令兒坐臥其瘡即愈羊肝散治痘毒入眼或無辜疳氣入眼密蒙花青葙子決明子車前子炒上為末用密蒙花末三錢余藥各一錢拌勻用羊肝一大葉薄批摻上濕紙里煨熟空心食之愚按前症若因肝經風熱傷血宜用本方若因肝經血虛風燥宜用四物湯加山梔釣藤鉤牡丹皮若因肝經血虛生風或腎水不能生肝木宜用六味丸若成肝疳者用六味地黃丸以滋肝腎用四味肥兒丸加人參白朮以補肝脾一小兒痘瘡目生昏翳或作或徹服退翳之藥不愈診之脈弦細而數此乃肝腎有疳症余用九味蘆薈丸及六味地黃丸又與輕粉黃丹散尋愈一小兒患兩目赤腫痛不可當此肝火為患用四物合小柴胡加山梔牛蒡子生甘草倍用穀精草數劑而愈一小兒痘愈後眼痛不開用犀角地黃湯加柴胡湯一劑而開又生赤翳迷滿仍用前藥加穀精草治之而愈蟬菊散治癍瘡入眼或病後生翳障蟬蛻洗淨去土白菊花各等分上每服二錢水一盞入蜜少許煎乳食後量兒大小與之羌菊散治痘毒上攻生翳並暴赤羞明羌活蟬蛻防風蛇蛻菊花穀精草木賊甘草山梔子白蒺藜大黃黃連沙苑蒺藜各等分上為末每服一錢清米泔溫暖調下丹粉散治痘毒膿水淋漓輕粉黃丹各五分黃連末二錢上研勻搽患處羚羊角散治小兒癍疹後餘毒不解上攻眼目生翳羞明眵淚俱多紅赤腫閉羚羊角鎊黃芩黃耆草決明車前子升麻防風大黃芒硝各等分上以水一盞煎半盞去滓稍熱服消毒化癍湯治小兒癍疹未滿二十一日而目疾作者餘症上同即消毒救苦湯羌活五分藁本二分細辛二分黃連三分黃芩一分酒芩二分酒柏三分生地黃三分麻黃五分升麻五分白朮一分蒼朮二分生甘草一分吳茱萸半分陳皮一分紅花半分蘇木一分當歸三分連翹三分防風五分川芎二分葛根一分柴胡二分上作一服水二盞煎至一盞去滓稍熱服穀精草散治痘疹已靨翳膜遮障瞳子等症穀精草蛤粉黑豆各二兩上為末用雄豬肝一葉竹刀批開摻藥在內以麻線縛定用罐內水煮熟令兒食之當歸補血湯治血氣損傷或妄服峻劑致氣血益虛肌熱大渴引飲目赤面紅脈洪大而虛重按全無此病多得於飢飽勞役者黃耆炙一兩當歸三錢酒製上水煎乳母同服濟生犀角地黃湯治鬱熱不解經絡隨氣湧泄為衄血或清道閉塞流入胃脘吐血或余血停滯面色痿黃大便色黑者犀角生地黃白芍藥牡丹皮各一錢上水煎服乳母同服四神丸治脾胃虛弱大便不實飲食不思或泄利腹痛等症肉豆蔻二兩補骨脂四兩五味子二兩吳茱萸浸炒一兩上為末生薑八兩紅棗一百枚煮熟取棗肉和末丸桐子大每服五七十丸空心或食前白湯服去五味子吳茱萸名二神丸四味肥兒丸治小兒食積五疳或白禿體瘦肚大筋青發稀成穗或遍身瘡疥等症蕪荑炒神麯炒麥蘖炒黃連各等分上為末豬膽汁丸黍豆大每服三十丸木通煎湯下九味蘆薈丸治小兒肝脾疳積體瘦熱渴大便不調或瘰癧結核耳內生瘡等症胡黃連黃連蘆薈木香蕪荑炒青皮白雷丸鶴膝草各一兩麝香三錢上為末蒸餅糊丸麻子大每服一錢空心白湯下大蕪荑湯一名梔子茯苓湯治小兒脾疳少食發熱作渴大便不調發黃脫落面黑便清鼻下生瘡能乳食土等症山梔三分黃柏甘草炙各二分蕪荑五分黃連防風各二分麻黃羌活柴胡各三分白朮茯苓當歸各四分上每服二三錢水煎濟生歸脾湯治脾血虧損健忘驚悸等症人參黃耆茯神各一錢甘草炙五分白朮炒一錢木香五分遠志酸棗仁炒龍眼肉當歸各一錢上水煎服愚按前方若乳母憂思傷脾血虛發熱食少體倦或脾不能攝血以致妄行吐下或健忘怔忡驚悸少寐或心脾作痛自汗盜汗或肢體腫痛大便不調或經後不準晡熱內熱或唇瘡流注等症致為患者用之令子母俱服八味地黃丸即錢氏地黃丸加肉桂附子各一兩愚按前方治稟賦命門火衰不能生土以致脾土虛寒或飲食少思或食而不化臍腹疼痛夜多漩溺等若病久元氣耗損所致尤宜用之或乳母命門火衰兒飲其乳以致前症者母宜服之加減八味丸即六味地黃丸加肉桂一兩五味子四兩治稟賦腎陰不足或吐瀉久病津液虧損口乾作渴或口舌生瘡兩足發熱或痰氣上湧或手足厥冷等症八珍湯即前四君子四物二湯相合愚按前方治氣血俱虛或因克伐之劑脾胃虧損肌肉消瘦發熱寒熱飲食少思等症十全大補湯即八珍湯加黃耆肉桂愚按前方氣血虛弱或稟賦不足寒熱自汗食少體瘦發熱作渴頭痛眩暈逍遙散加山梔牡丹名加味逍遙散當歸甘草炙芍藥酒炒茯苓白朮炒柴胡各一錢牡丹皮山梔炒各七分上水煎服愚按前方若乳母肝脾血虛內熱或遍身搔癢寒熱或肢體作痛頭目昏重或怔忡頰赤口燥咽乾或發汗盜汗食少不寐或口舌生瘡耳內作痛或胸乳腹脹小便不利致兒為患者尤宜用之九味龍膽瀉肝湯治肝經濕熱或囊癰下疳便毒小便澀滯或陰囊作痛小便短少愚制龍膽草車前子木通當歸尾澤瀉各五分甘草黃芩生地黃山梔各三分上水煎子母同服抑肝散治肝經虛熱發搐或發熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹膨少食睡臥不安愚制軟柴胡甘草各五分川芎八分當歸白朮炒茯苓釣藤鉤各一錢上水煎子母同服梔子清肝散一名柴胡梔子散治三焦及足少陽經風熱耳內作癢生瘡或水出疼痛或胸乳間作痛或寒熱往來柴胡梔子牡丹皮各一錢茯苓川芎芍藥當歸牛蒡子炒各半分甘草上水煎子母服若太陽頭痛加羌活柴胡清肝散治鬢疽及肝膽三焦風熱怒火之症或項胸作痛瘡毒發熱愚制柴胡一錢半黃芩炒人參川芎各一錢半山梔炒一錢半連翹甘草五分桔梗八分上水煎子母同服小柴胡湯加山梔牡丹皮名加味小柴胡治傷寒溫熱身熱惡風頭痛項強四肢煩疼往來寒熱嘔噦痰實中暑瘧疾並服之閻注柴胡二錢黃芩炒一錢半人參半夏各七分甘草炙五分上姜水煎子母同服愚按前方若肝膽經風熱肝火瘰癧寒熱往來日晡發熱潮熱身熱不欲飲食或怒火口苦耳聾咳嗽或肋痛胸滿小便不利或泄瀉吐酸苦水或肢體搐動唇目抽札並宜用之砭法治丹毒疔瘡紅絲走散或時毒瘀血壅盛或色赤走亂用細磁器擊碎取有鋒芒劑以箸劈開頭夾之麻線纏定兩指輕撮箸稍令磁芒正對患處懸寸許再用箸頻擊神功散治痘毒腫焮作痛未成者敷之即散已潰者敷之腫痛即消黃柏炒草烏炒血竭加上為末等分津調敷患處製附子法附子重一兩三四錢有蓮花瓣頭圓底平者先備童便五六碗將附子先放在灶上煙匱中間良久乘熱投入童便浸五七日後潤透揭皮切四塊仍浸二三日用粗紙數層包之浸濕埋灰火半日取出切片檢視有白星者仍用瓦上炙熟至無白星為度如急用即切大片用童便煮二三沸熱瓦熟用之丹溪先生解瘡毒藥絲瓜升麻芍藥炒生甘草山楂黑豆赤小豆犀角鎊各等分上為粗散每服三錢水一大盞煎至六分去滓不拘時徐徐溫服量大小加減稀痘方用老鼠去皮取肉水煮熟量兒大小與食數次出痘甚稀未食葷時與食尤效屢試屢驗
